# Hera Validate — GitHub Action
#
# Validates an agent implementation against Hera architecture.
#
# Usage:
#   - name: Validate Agent
#     uses: ahmdd4vd/hera/.github/actions/validate@main
#     with:
#       directory: './src'

name: "Hera Validate"
description: "Validate an agent implementation against Hera architecture"

inputs:
  directory:
    description: "Directory to validate"
    required: false
    default: "."

outputs:
  score:
    description: "Validation score (0-100)"
    value: ${{ steps.validate.outputs.score }}
  passed:
    description: "Whether validation passed (score >= 80)"
    value: ${{ steps.validate.outputs.passed }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Hera CLI
      shell: bash
      run: |
        npm install -g tsx

    - name: Validate
      id: validate
      shell: bash
      run: |
        # Run validation ONCE and capture output
        OUTPUT=$(npx tsx ${{ github.action_path }}/../../cli/hera-validate.ts ${{ inputs.directory }} 2>&1 || true)

        echo "$OUTPUT"

        # Parse score from captured output (no second run needed)
        SCORE=$(echo "$OUTPUT" | grep -oP 'Score: \K\d+' || echo "0")

        echo "score=$SCORE" >> $GITHUB_OUTPUT

        if [ "$SCORE" -ge 80 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const score = '${{ steps.validate.outputs.score }}';
          const passed = '${{ steps.validate.outputs.passed }}' === 'true';
          const icon = passed ? '✅' : '❌';

          const body = `## ${icon} Hera Validation Report

          **Score:** ${score}/100
          **Status:** ${passed ? 'Passed' : 'Failed'}

          ${passed ? 'Implementation matches Hera architecture!' : 'Some checks failed. Run `hera validate` locally for details.'}

          ---
          *Validated by [Hera Framework](https://github.com/ahmdd4vd/hera)*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
